name: PlanPing scraper

on:
  schedule:
    - cron: '0 3 * * *'   # scrape nightly
    - cron: '0 4 * * *'   # geocode nightly
    - cron: '0 9 * * *'   # alerts morning
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'scrape'
        type: choice
        options: [scrape, scrape_bulk, geocode, alerts]

jobs:
  scrape:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary httpx
      - name: Run fast harvester
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd scrapers && python data_gov_harvester.py

  scrape_bulk:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape_bulk'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary httpx
      - name: Run bulk harvester (large historic datasets)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd scrapers && python data_gov_harvester.py --bulk

  geocode:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'geocode') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary httpx
      - name: Geocode missing coordinates
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd scrapers && python geocoder.py

  alerts:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'alerts') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install psycopg2-binary httpx
      - name: Dispatch alerts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: python dispatch_alerts.py
