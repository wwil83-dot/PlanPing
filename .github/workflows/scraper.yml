name: PlanPing scraper

on:
  schedule:
    - cron: '0 3 * * *'   # open data scrape
    - cron: '0 4 * * *'   # idox nightly scrape — batch 1
    - cron: '10 4 * * *'  # idox nightly scrape — batch 2
    - cron: '20 4 * * *'  # arcus nightly scrape
    - cron: '0 9 * * *'   # alerts
    - cron: '0 8 * * 1'   # council health digest — weekly, Monday 8am
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'scrape'
        type: choice
        options: [scrape, scrape_bulk, scrape_idox_a, scrape_idox_b, scrape_idox_bulk, scrape_arcus, alerts, council_health, arcus_recon, idox_month_test, idox_form_recon, idox_multi_recon]
      arcus_target_url:
        description: '(arcus_recon only) base URL to reconnoitre, e.g. https://example.my.site.com/pr/s — leave blank to default to Ashford as a sanity check'
        required: false
        default: ''
      arcus_target_name:
        description: '(arcus_recon only) human-readable name for the council being reconnoitred, purely for log readability'
        required: false
        default: ''

jobs:
  scrape:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx
      - name: Run harvester
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cd scrapers && python data_gov_harvester.py

  scrape_bulk:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape_bulk'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx
      - name: Run bulk harvester
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cd scrapers && python data_gov_harvester.py --bulk

  # ---------------------------------------------------------------------
  # Idox nightly scrape — split into two batches (2026-07-10).
  #
  # A single job covering the full council list was creeping toward
  # GitHub Actions' 65-minute hard timeout as councils were added
  # (47.9 → 48.6 → 57.5 → 60.1 → 56.3 → 58.4 → 60.2 minutes across
  # successive sessions, even after fixing the pagination-loop bug that
  # was separately wasting time). Splitting in two gives each batch
  # roughly half the councils and comfortable headroom to keep growing
  # the list without hitting the ceiling again.
  #
  # The split itself is computed dynamically inside idox_scraper.py from
  # IDOX_COUNCILS' current length (see --batch flag) — nothing here needs
  # updating as councils are added or removed, it always rebalances.
  #
  # Batch 2 is offset 10 minutes after batch 1 starts so they don't both
  # launch Playwright/Chromium at the exact same instant on GitHub's
  # shared runner pool.
  # ---------------------------------------------------------------------
  scrape_idox_a:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape_idox_a') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - run: pip install playwright beautifulsoup4 httpx
      - run: playwright install --with-deps chromium
      - name: Run Idox scraper — nightly batch 1 of 2 (last 14 days)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_MINUTES: "55"
          DAYS_BACK: "14"
          CONCURRENCY: "3"
        run: cd scrapers && python idox_scraper.py --batch=1

  scrape_idox_b:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape_idox_b') ||
      (github.event_name == 'schedule' && github.event.schedule == '10 4 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - run: pip install playwright beautifulsoup4 httpx
      - run: playwright install --with-deps chromium
      - name: Run Idox scraper — nightly batch 2 of 2 (last 14 days)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_MINUTES: "55"
          DAYS_BACK: "14"
          CONCURRENCY: "3"
        run: cd scrapers && python idox_scraper.py --batch=2

  scrape_idox_bulk:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape_idox_bulk'
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - run: pip install playwright beautifulsoup4 httpx
      - run: playwright install --with-deps chromium
      - name: Run Idox scraper — bulk (last 180 days, full council list)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_MINUTES: "180"
          DAYS_BACK: "180"
          CONCURRENCY: "1"
        run: cd scrapers && python idox_scraper.py --bulk

  # ---------------------------------------------------------------------
  # Arcus (Salesforce Built Environment) nightly scrape — built 2026-07-14
  # from 12 rounds of live reconnaissance. See arcus_councils.py and
  # arcus_scraper.py module docstrings for the full mechanism writeup.
  #
  # Starts small (3 confirmed councils) deliberately — CONCURRENCY=2 and a
  # 30-minute budget give generous headroom while the real-world
  # reliability of this brand-new scraper is still being proven out night
  # to night. Both can be raised once it's shown to run cleanly for a
  # week or two, same maturation path idox_scraper.py went through.
  # ---------------------------------------------------------------------
  scrape_arcus:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape_arcus') ||
      (github.event_name == 'schedule' && github.event.schedule == '20 4 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - run: pip install playwright beautifulsoup4 httpx
      - run: playwright install --with-deps chromium
      - name: Run Arcus scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAX_MINUTES: "30"
          CONCURRENCY: "2"
        run: cd scrapers && python arcus_scraper.py

  # ---------------------------------------------------------------------
  # Idox month-selection diagnostic — manual trigger only, no schedule.
  #
  # Built 2026-07-17 after the round-3 bulk-mode fix (select the correct
  # dropdown option by month_index instead of always index=0) did NOT
  # resolve identical-results-across-months on a real bulk run. Rather
  # than guess at a further fix and burn another ~3-hour, 210-council
  # bulk run to find out if it worked, this tests just 3 councils x 3
  # month indices directly using the REAL IdoxPortal._scrape_month()
  # method (imported, not reimplemented) — a few minutes, not hours.
  # Does NOT touch Supabase at all — purely diagnostic, prints results
  # straight to the log.
  # ---------------------------------------------------------------------
  idox_month_test:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'idox_month_test'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - run: pip install playwright beautifulsoup4 httpx
      - run: playwright install --with-deps chromium
      - name: Run Idox month-selection diagnostic
        run: cd scrapers && python idox_month_test.py

  # ---------------------------------------------------------------------
  # Idox form-element recon — manual trigger only, no schedule.
  #
  # Built 2026-07-17 right after idox_month_test.py conclusively proved
  # the month-selection dropdown genuinely isn't found by any of the 4
  # candidate selectors, across 3 councils on 2 different server setups.
  # Captures direct evidence of every real <select>/<input> element on an
  # actual monthly-list page, so the correct selector can be identified
  # from real HTML rather than guessed a 5th time.
  # ---------------------------------------------------------------------
  idox_form_recon:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'idox_form_recon'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - run: pip install playwright
      - run: playwright install --with-deps chromium
      - name: Run Idox form-element recon
        run: cd scrapers && python idox_form_recon.py
      - name: Upload recon output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: idox-form-recon-output
          path: /tmp/idox_form_recon.*
          retention-days: 7

  # ---------------------------------------------------------------------
  # Idox multi-council recon — manual trigger only, no schedule.
  #
  # Built 2026-07-20 after council_health_check.py flagged 4 councils
  # failing PERSISTENTLY (5+ consecutive empty runs each, not just a
  # noisy timeout night): Renfrewshire, Brighton and Hove, Tonbridge and
  # Malling, London Borough of Brent. Each showed a distinct, stable
  # failure signature across multiple real runs, so this captures direct
  # HTML evidence from all 4 in one pass rather than guessing a fix.
  #
  # IMPORTANT: Renfrewshire is configured "weekly" in idox_councils.py —
  # it goes through a completely different code path than the other
  # three's standard monthly-list flow, and this script correctly probes
  # each council with its real production flow rather than one shared
  # template.
  # ---------------------------------------------------------------------
  idox_multi_recon:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'idox_multi_recon'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - run: pip install playwright
      - run: playwright install --with-deps chromium
      - name: Run Idox multi-council recon (Renfrewshire/Brighton/Tonbridge/Brent)
        run: cd scrapers && python idox_multi_recon.py
      - name: Upload recon output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: idox-multi-recon-output
          path: /tmp/idox_recon_*.html
          retention-days: 7

  alerts:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'alerts') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx
      - name: Dispatch alerts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: python dispatch_alerts.py

  # ---------------------------------------------------------------------
  # Council health digest — weekly. Emails a summary of any Idox-scraped
  # council that's returned zero applications for EMPTY_RUN_THRESHOLD (see
  # council_health_check.py, default 5) CONSECUTIVE nightly runs. Sends
  # nothing if every council is healthy, so a real alert actually stands
  # out rather than getting lost in routine noise. Requires the
  # consecutive_empty_runs / last_saved_at columns and increment_empty_runs
  # RPC function from migration_council_health.sql to already be applied.
  # ---------------------------------------------------------------------
  council_health:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'council_health') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx
      - name: Check council health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: cd scrapers && python council_health_check.py

  # ---------------------------------------------------------------------
  # Arcus reconnaissance — manual trigger only, no schedule.
  #
  # The FINAL, reusable version (2026-07-14) — consolidates 12 rounds of
  # live investigation into a single tool for onboarding future Arcus
  # councils. Targets Ashford by default (a known-working sanity check);
  # override arcus_target_url/arcus_target_name via workflow_dispatch
  # inputs when reconnoitring a genuinely new council. See
  # scrapers/arcus_recon.py's module docstring for the full mechanism
  # writeup and scrapers/arcus_councils.py for how confirmed councils get
  # added afterward.
  #
  # Results are uploaded as a workflow artifact (Actions run summary page,
  # "Artifacts" section) rather than needing SUPABASE/RESEND secrets —
  # this job doesn't touch the database at all.
  # ---------------------------------------------------------------------
  arcus_recon:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'arcus_recon'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1
      - run: pip install playwright
      - run: playwright install --with-deps chromium
      - name: Run Arcus recon
        env:
          ARCUS_TARGET_URL: ${{ github.event.inputs.arcus_target_url }}
          ARCUS_TARGET_NAME: ${{ github.event.inputs.arcus_target_name }}
        run: cd scrapers && python arcus_recon.py
      - name: Upload recon output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arcus-recon-output
          path: /tmp/arcus_recon_*
          retention-days: 7
